services:
  # ============================================================================
  # AIO Profile - All-in-One single container deployment
  # Usage: docker compose --profile aio up -d
  # ============================================================================
  aio:
    build:
      context: .
      dockerfile: Dockerfile.aio
    image: observer:aio
    container_name: observer-aio
    profiles: ["aio"]
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://127.0.0.1:27017/observer
      POSTGRES_USER: ${POSTGRES_USER:-observer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-observer}
      POSTGRES_DSN: postgres://${POSTGRES_USER:-observer}:${POSTGRES_PASSWORD:-password}@127.0.0.1:5432/${POSTGRES_DB:-observer}?sslmode=disable
      STORAGE_DRIVER: local
      STORAGE_LOCAL_BASE_PATH: /data/artifacts
      STORAGE_LOCAL_BASE_URL: http://localhost:${AIO_WEB_PORT:-3000}/api/attachments
    ports:
      - "0.0.0.0:${AIO_WEB_PORT:-3000}:80" # Web UI
      - "0.0.0.0:${AIO_GRPC_PORT:-50051}:50051" # gRPC ingestion
      - "0.0.0.0:${AIO_API_PORT:-8080}:8080" # API service (internal)
      - "0.0.0.0:${AIO_NATS_PORT:-4222}:4222" # NATS client
      - "0.0.0.0:${AIO_NATS_HTTP_PORT:-8222}:8222" # NATS monitoring
      - "0.0.0.0:${AIO_POSTGRES_PORT:-5432}:5432" # PostgreSQL for local debugging
    volumes:
      - aio-data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - observer-net

  # ============================================================================
  # Distributed Profile - Multi-container deployment (MongoDB)
  # Usage: docker compose --profile dist up -d
  # ============================================================================

  # Ingestion service - gRPC endpoint for test reporters
  ingestion:
    build:
      context: .
      dockerfile: Dockerfile.ingestion
    image: observer:ingestion
    container_name: observer-ingestion
    profiles: ["dist", "web-dev"]
    restart: unless-stopped
    environment:
      PORT: "50051"
      NATS_URL: nats://nats:4222
      NATS_STREAM: tests_events
      NATS_SUBJECT_PREFIX: tests.events.v1
    ports:
      - "0.0.0.0:${INGESTION_PORT:-50051}:50051"
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pgrep", "-f", "ingestion"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - observer-net

  # Processor service - Consumes events from NATS and writes to database
  processor:
    build:
      context: .
      dockerfile: Dockerfile.processor
    image: observer:processor
    container_name: observer-processor
    profiles: ["dist", "web-dev"]
    restart: unless-stopped
    environment:
      RETAIN_MESSAGES: "true"
      NATS_URL: nats://nats:4222
      NATS_STREAM: tests_events
      NATS_CONSUMER: processor
      POSTGRES_DSN: postgres://${POSTGRES_USER:-observer}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-observer}?sslmode=disable
      MONGODB_URI: mongodb://${MONGO_USER:-root}:${MONGO_PASSWORD:-password}@mongodb:27017/${MONGO_DATABASE:-observer}?authSource=admin
      STORAGE_DRIVER: local
      STORAGE_LOCAL_BASE_PATH: /data/artifacts
      STORAGE_LOCAL_BASE_URL: http://localhost:${API_PORT:-8080}/api/attachments
    volumes:
      - observer-artifacts:/data/artifacts
    depends_on:
      nats:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pgrep", "-f", "processor"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - observer-net

  # Processor service with MongoDB backend
  processor-mongo:
    build:
      context: .
      dockerfile: Dockerfile.processor
    image: observer:processor
    container_name: observer-processor-mongo
    profiles: ["mongo"]
    restart: unless-stopped
    environment:
      NATS_URL: nats://nats:4222
      NATS_STREAM: tests_events
      NATS_CONSUMER: mongo-processor
      MONGODB_URI: mongodb://${MONGO_USER:-root}:${MONGO_PASSWORD:-password}@mongodb:27017/${MONGO_DATABASE:-observer}?authSource=admin
    depends_on:
      nats:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pgrep", "-f", "processor"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - observer-net

  # API service - HTTP API and UI
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: observer:api
    container_name: observer-api
    profiles: ["dist", "web-dev"]
    restart: unless-stopped
    environment:
      PORT: "8080"
      POSTGRES_DSN: postgres://${POSTGRES_USER:-observer}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-observer}?sslmode=disable
      MONGODB_URI: mongodb://${MONGO_USER:-root}:${MONGO_PASSWORD:-password}@mongodb:27017/${MONGO_DATABASE:-observer}?authSource=admin
      NATS_URL: nats://nats:4222
      NATS_STREAM: tests_events
      NATS_WS_CONSUMER: websocket
      CORS_ALLOWED_ORIGINS: "*" # Allow all origins for development
      STORAGE_DRIVER: local
      STORAGE_LOCAL_BASE_PATH: /data/artifacts
      STORAGE_LOCAL_BASE_URL: http://localhost:${API_PORT:-8080}/api/attachments
    ports:
      - "0.0.0.0:${API_PORT:-8080}:8080" # Expose API port for local web development
    volumes:
      - observer-artifacts:/data/artifacts
    depends_on:
      mongodb:
        condition: service_healthy
      nats:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - observer-net

  # API service with MongoDB backend
  api-mongo:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: observer:api
    container_name: observer-api-mongo
    profiles: ["mongo"]
    restart: unless-stopped
    environment:
      PORT: "8080"
      MONGODB_URI: mongodb://${MONGO_USER:-root}:${MONGO_PASSWORD:-password}@mongodb:27017/${MONGO_DATABASE:-observer}?authSource=admin
      NATS_URL: nats://nats:4222
      NATS_STREAM: tests_events
      NATS_WS_CONSUMER: websocket
      CORS_ALLOWED_ORIGINS: "*" # Allow all origins for development
    ports:
      - "0.0.0.0:${API_PORT:-8080}:8080" # Expose API port for local web development
    depends_on:
      mongodb:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - observer-net

  # Web UI service - Nginx serving React app and proxying to API
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    image: observer:web
    container_name: observer-web
    profiles: ["dist"]
    restart: unless-stopped
    environment:
      API_BACKEND_HOST: api
      API_BACKEND_PORT: "8080"
    ports:
      - "0.0.0.0:${WEB_PORT:-3000}:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - observer-net

  # Web UI service with MongoDB backend
  web-mongo:
    build:
      context: .
      dockerfile: Dockerfile.web
    image: observer:web
    container_name: observer-web-mongo
    profiles: ["mongo"]
    restart: unless-stopped
    environment:
      API_BACKEND_HOST: api-mongo
      API_BACKEND_PORT: "8080"
    ports:
      - "0.0.0.0:${WEB_PORT:-3000}:80"
    depends_on:
      api-mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - observer-net

  # ============================================================================
  # Shared Infrastructure Services
  # Used by distributed profile and available for development
  # ============================================================================

  # MongoDB service for document-based storage
  mongodb:
    image: mongo:7.0
    container_name: observer-mongodb
    profiles: ["dist", "infra", "web-dev"]
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-observer}
    ports:
      - "0.0.0.0:${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - observer-net

  # PostgreSQL service for relational execution storage
  postgres:
    image: postgres:16-alpine
    container_name: observer-postgres
    profiles: ["dist", "infra", "web-dev"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-observer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-observer}
    ports:
      - "0.0.0.0:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-observer} -d ${POSTGRES_DB:-observer}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - observer-net

  nats:
    image: nats:2.10-alpine
    container_name: observer-nats
    profiles: ["dist", "infra", "web-dev"]
    restart: unless-stopped
    command: ["-js", "-m", "8222"]
    ports:
      - "0.0.0.0:${NATS_PORT:-4222}:4222"
      - "0.0.0.0:${NATS_HTTP_PORT:-8222}:8222"
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - observer-net

volumes:
  mongodb-data:
  postgres-data:
  nats-data:
  aio-data:
  observer-artifacts:

networks:
  observer-net:
