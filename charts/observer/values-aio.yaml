# Values for AIO (All-in-One) deployment mode
# Override default values with: helm install observer ./charts/observer -f charts/observer/values-aio.yaml
#
# Note: AIO mode uses s6-overlay which requires root privileges for initialization.
# Services will run with appropriate user privileges managed by s6-overlay.

mode: aio

aio:
  enabled: true
  replicaCount: 1

  resources:
    limits:
      cpu: 2000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 512Mi

  persistence:
    enabled: true
    size: 10Gi

distributed:
  enabled: false

# Disable external dependencies in AIO mode
postgresql:
  enabled: false

nats:
  enabled: false

ingress:
  # Google-managed SSL certificate for HTTPS
  managedCertificate:
    enabled: true

  # SSL/HTTPS configuration
  ssl:
    # Redirect HTTP to HTTPS (enable after certificates are Active)
    # Check status: kubectl describe managedcertificate observer-cert -n observer-test
    redirect: false
    policy: "MODERN"

  # Web UI ingress - serves the React frontend
  web:
    enabled: true
    className: "gce"
    annotations:
      kubernetes.io/ingress.class: "gce"
      # cert-manager.io/cluster-issuer: "letsencrypt-prod"
      # nginx.ingress.kubernetes.io/ssl-redirect: "true"
    hosts:
      - host: observer.stanterprise.dev
        paths:
          - path: /
            pathType: Prefix
    tls:
      []
      # - secretName: observer-web-tls
      #   hosts:
      #     - observer.example.com

  # API ingress - serves the REST/GraphQL API and WebSocket
  api:
    enabled: true
    className: "gce"
    annotations:
      kubernetes.io/ingress.class: "gce"
      kubernetes.io/ingress.allow-http: "true"
      # cert-manager.io/cluster-issuer: "letsencrypt-prod"
      # nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
      # nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
      # nginx.ingress.kubernetes.io/websocket-services: "observer-api"
    hosts:
      - host: api.observer.stanterprise.dev
        paths:
          - path: /
            pathType: Prefix
    tls:
      []
      # - secretName: observer-api-tls
      #   hosts:
      #     - api.observer.example.com
  # gRPC ingress - serves the gRPC ingestion endpoint
  grpc:
    enabled: true
    className: "gce"
    annotations:
      kubernetes.io/ingress.class: "gce"
      # nginx.ingress.kubernetes.io/ssl-redirect: "true"
    hosts:
      - host: grpc.observer.stanterprise.dev
        paths:
          - path: /
            pathType: Prefix
    tls:
      []
      # - secretName: observer-grpc-tls
      #   hosts:
      #     - grpc.observer.example.com
    # GCP BackendConfig for gRPC - enables HTTP/2 for gRPC support
    backendConfig:
      enabled: true
      healthCheck:
        checkIntervalSec: 10
        timeoutSec: 5
        type: HTTP2
        requestPath: /grpc.health.v1.Health/Check
      timeoutSec: 30
      connectionDraining:
        drainingTimeoutSec: 60
