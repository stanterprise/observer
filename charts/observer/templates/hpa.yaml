{{- if and (eq .Values.mode "distributed") .Values.distributed.enabled .Values.distributed.ingestion.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "observer.fullname" . }}-ingestion
  labels:
    {{- include "observer.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingestion
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "observer.fullname" . }}-ingestion
  minReplicas: {{ .Values.distributed.ingestion.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.distributed.ingestion.autoscaling.maxReplicas }}
  metrics:
  {{- if .Values.distributed.ingestion.autoscaling.targetCPUUtilizationPercentage }}
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{ .Values.distributed.ingestion.autoscaling.targetCPUUtilizationPercentage }}
  {{- end }}
  {{- if .Values.distributed.ingestion.autoscaling.targetMemoryUtilizationPercentage }}
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: {{ .Values.distributed.ingestion.autoscaling.targetMemoryUtilizationPercentage }}
  {{- end }}
{{- end }}
