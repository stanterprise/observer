{{/*
Web UI Ingress
*/}}
{{- if .Values.ingress.web.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "observer.fullname" . }}-web
  labels:
    {{- include "observer.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
  annotations:
    {{- if .Values.ingress.managedCertificate.enabled }}
    networking.gke.io/managed-certificates: {{ include "observer.fullname" . }}-cert
    kubernetes.io/ingress.allow-http: "true"
    {{- if or .Values.ingress.ssl.redirect .Values.ingress.ssl.policy }}
    networking.gke.io/v1beta1.FrontendConfig: {{ include "observer.fullname" . }}-frontend
    {{- end }}
    {{- end }}
    {{- with .Values.ingress.web.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.ingress.web.className }}
  ingressClassName: {{ .Values.ingress.web.className }}
  {{- end }}
  {{- if .Values.ingress.web.tls }}
  tls:
    {{- range .Values.ingress.web.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.web.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                {{- if eq $.Values.mode "aio" }}
                name: {{ include "observer.fullname" $ }}-aio
                {{- else }}
                name: {{ include "observer.fullname" $ }}-web
                {{- end }}
                port:
                  number: 80
          {{- end }}
    {{- end }}
{{- end }}
