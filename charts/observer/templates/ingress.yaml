{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "observer.fullname" . }}
  labels:
    {{- include "observer.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                {{- if eq .service "web" }}
                {{- if eq $.Values.mode "aio" }}
                name: {{ include "observer.fullname" $ }}-aio
                {{- else }}
                name: {{ include "observer.fullname" $ }}-web
                {{- end }}
                port:
                  number: 80
                {{- else if eq .service "api" }}
                name: {{ include "observer.fullname" $ }}-api
                port:
                  number: 8080
                {{- end }}
          {{- end }}
    {{- end }}
{{- end }}
---
{{- if .Values.ingress.grpc.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "observer.fullname" . }}-grpc
  labels:
    {{- include "observer.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingestion
  {{- with .Values.ingress.grpc.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.grpc.className }}
  ingressClassName: {{ .Values.ingress.grpc.className }}
  {{- end }}
  rules:
    {{- range .Values.ingress.grpc.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                {{- if eq $.Values.mode "aio" }}
                name: {{ include "observer.fullname" $ }}-aio
                {{- else }}
                name: {{ include "observer.fullname" $ }}-ingestion
                {{- end }}
                port:
                  number: 50051
          {{- end }}
    {{- end }}
{{- end }}
