{{- if and (eq .Values.mode "distributed") .Values.distributed.enabled (not .Values.runtime.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "observer.runtimeSecretName" . }}
  labels:
    {{- include "observer.labels" . | nindent 4 }}
type: Opaque
stringData:
  NATS_URL: {{ include "observer.nats.url" . | quote }}
  POSTGRES_DSN: {{ include "observer.postgres.dsn" . | quote }}
  MONGODB_URI: {{ include "observer.database.url" . | quote }}
{{- end }}
