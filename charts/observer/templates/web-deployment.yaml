{{- if and (eq .Values.mode "distributed") .Values.distributed.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "observer.fullname" . }}-web
  labels:
    {{- include "observer.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  {{- if not .Values.distributed.web.autoscaling.enabled }}
  replicas: {{ .Values.distributed.web.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "observer.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        {{- include "observer.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: web
    spec:
      serviceAccountName: {{ include "observer.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: web
        {{- $webSecurityContext := .Values.distributed.web.securityContext | default .Values.securityContext }}
        securityContext:
          {{- toYaml $webSecurityContext | nindent 10 }}
        image: {{ include "observer.image" (dict "component" "web" "Values" .Values "Chart" .Chart) }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        env:
        - name: NGINX_ENVSUBST_TEMPLATE_DIR
          value: /tmp/nonexistent
        {{- range $key, $value := .Values.distributed.web.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          {{- toYaml .Values.distributed.web.resources | nindent 10 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
