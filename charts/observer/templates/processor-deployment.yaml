{{- if and (eq .Values.mode "distributed") .Values.distributed.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "observer.fullname" . }}-processor
  labels:
    {{- include "observer.labels" . | nindent 4 }}
    app.kubernetes.io/component: processor
spec:
  {{- if not .Values.distributed.processor.autoscaling.enabled }}
  replicas: {{ .Values.distributed.processor.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "observer.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: processor
  template:
    metadata:
      labels:
        {{- include "observer.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: processor
    spec:
      serviceAccountName: {{ include "observer.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.postgres.migration.enabled }}
      initContainers:
      - name: migrate
        securityContext:
          {{- toYaml .Values.securityContext | nindent 10 }}
        image: {{ include "observer.image" (dict "component" "api" "Values" .Values "Chart" .Chart) }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        env:
        - name: POSTGRES_DSN
          value: {{ include "observer.postgres.dsn" . | quote }}
        command:
        - /bin/sh
        - -c
        - |
          set -e
          attempt=0
          until /usr/local/bin/migrate -action=up; do
            attempt=$((attempt + 1))
            if [ "$attempt" -ge 90 ]; then
              echo "Migration failed after 90 attempts" >&2
              exit 1
            fi
            echo "Migration attempt $attempt failed; retrying in 2s..."
            sleep 2
          done
      {{- end }}
      containers:
      - name: processor
        securityContext:
          {{- toYaml .Values.securityContext | nindent 10 }}
        image: {{ include "observer.image" (dict "component" "processor" "Values" .Values "Chart" .Chart) }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        env:
        - name: NATS_URL
          value: {{ include "observer.nats.url" . }}
        - name: POSTGRES_DSN
          value: {{ include "observer.postgres.dsn" . | quote }}
        - name: MONGODB_URI
          value: {{ include "observer.database.url" . }}
        {{- range $key, $value := .Values.distributed.processor.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        livenessProbe:
          exec:
            command:
            - pgrep
            - -f
            - processor
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - pgrep
            - -f
            - processor
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          {{- toYaml .Values.distributed.processor.resources | nindent 10 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
