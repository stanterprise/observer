{{- if and (eq .Values.mode "distributed") .Values.distributed.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "observer.fullname" . }}-processor
  labels:
    {{- include "observer.labels" . | nindent 4 }}
    app.kubernetes.io/component: processor
spec:
  {{- if not .Values.distributed.processor.autoscaling.enabled }}
  replicas: {{ .Values.distributed.processor.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "observer.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: processor
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "observer.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: processor
    spec:
      serviceAccountName: {{ include "observer.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: processor
        securityContext:
          {{- toYaml .Values.securityContext | nindent 10 }}
        image: {{ include "observer.image" (dict "component" "processor" "Values" .Values "Chart" .Chart) }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        env:
        - name: NATS_URL
          valueFrom:
            secretKeyRef:
              name: {{ include "observer.runtimeSecretName" . }}
              key: NATS_URL
        - name: POSTGRES_DSN
          valueFrom:
            secretKeyRef:
              name: {{ include "observer.runtimeSecretName" . }}
              key: POSTGRES_DSN
        - name: MONGODB_URI
          valueFrom:
            secretKeyRef:
              name: {{ include "observer.runtimeSecretName" . }}
              key: MONGODB_URI
        {{- range $key, $value := .Values.distributed.processor.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        livenessProbe:
          exec:
            command:
            - pgrep
            - -f
            - processor
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - pgrep
            - -f
            - processor
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          {{- toYaml .Values.distributed.processor.resources | nindent 10 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
