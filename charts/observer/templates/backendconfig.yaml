{{/*
GCP BackendConfig for gRPC
Only created when using GCE ingress class and backendConfig is enabled
*/}}
{{- if and .Values.ingress.grpc.enabled .Values.ingress.grpc.backendConfig.enabled }}
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: {{ include "observer.fullname" . }}-grpc-backend
  labels:
    {{- include "observer.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingestion
spec:
  {{- if .Values.ingress.grpc.backendConfig.protocol }}
  sessionAffinity:
    affinityType: "NONE"
  {{- end }}
  healthCheck:
    checkIntervalSec: {{ .Values.ingress.grpc.backendConfig.healthCheck.checkIntervalSec }}
    timeoutSec: {{ .Values.ingress.grpc.backendConfig.healthCheck.timeoutSec }}
    type: {{ .Values.ingress.grpc.backendConfig.healthCheck.type }}
    {{- if .Values.ingress.grpc.backendConfig.healthCheck.port }}
    port: {{ .Values.ingress.grpc.backendConfig.healthCheck.port }}
    {{- end }}
    {{- if .Values.ingress.grpc.backendConfig.healthCheck.requestPath }}
    requestPath: {{ .Values.ingress.grpc.backendConfig.healthCheck.requestPath }}
    {{- end }}
  {{- if .Values.ingress.grpc.backendConfig.timeoutSec }}
  timeoutSec: {{ .Values.ingress.grpc.backendConfig.timeoutSec }}
  {{- end }}
  {{- if .Values.ingress.grpc.backendConfig.connectionDraining }}
  connectionDraining:
    drainingTimeoutSec: {{ .Values.ingress.grpc.backendConfig.connectionDraining.drainingTimeoutSec }}
  {{- end }}
{{- end }}
