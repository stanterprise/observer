{{- if and (eq .Values.mode "aio") .Values.aio.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "observer.fullname" . }}-aio
  labels:
    {{- include "observer.labels" . | nindent 4 }}
    app.kubernetes.io/component: aio
spec:
  replicas: {{ .Values.aio.replicaCount }}
  selector:
    matchLabels:
      {{- include "observer.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: aio
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "observer.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: aio
    spec:
      serviceAccountName: {{ include "observer.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: aio
        securityContext:
          {{- toYaml .Values.aioSecurityContext | nindent 10 }}
        image: {{ include "observer.image" (dict "component" "aio" "Values" .Values "Chart" .Chart) }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: web
          containerPort: 80
          protocol: TCP
        - name: grpc
          containerPort: 50051
          protocol: TCP
        - name: health
          containerPort: 8081
          protocol: TCP
        - name: api
          containerPort: 8080
          protocol: TCP
        - name: nats
          containerPort: 4222
          protocol: TCP
        - name: nats-monitor
          containerPort: 8222
          protocol: TCP
        env:
        {{- range $key, $value := .Values.aio.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        livenessProbe:
          grpc:
            port: 50051
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          grpc:
            port: 50051
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
        resources:
          {{- toYaml .Values.aio.resources | nindent 10 }}
        volumeMounts:
        - name: data
          mountPath: /data
        - name: run
          mountPath: /run
        - name: tmp
          mountPath: /tmp
        - name: nginx-cache
          mountPath: /var/cache/nginx
        - name: nginx-lib
          mountPath: /var/lib/nginx
      volumes:
      - name: data
        {{- if .Values.aio.persistence.enabled }}
        persistentVolumeClaim:
          claimName: {{ .Values.aio.persistence.existingClaim | default (printf "%s-aio" (include "observer.fullname" .)) }}
        {{- else }}
        emptyDir: {}
        {{- end }}
      - name: run
        emptyDir:
          medium: Memory
      - name: tmp
        emptyDir:
          medium: Memory
      - name: nginx-cache
        emptyDir: {}
      - name: nginx-lib
        emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
