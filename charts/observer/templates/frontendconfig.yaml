{{/*
GCP FrontendConfig for SSL Policy and HTTP to HTTPS redirect
Only created when using GCE ingress class and SSL is configured
*/}}
{{- if and .Values.ingress.managedCertificate.enabled (or .Values.ingress.ssl.redirect (ne .Values.ingress.ssl.policy "")) }}
apiVersion: networking.gke.io/v1beta1
kind: FrontendConfig
metadata:
  name: {{ include "observer.fullname" . }}-frontend
  labels:
    {{- include "observer.labels" . | nindent 4 }}
spec:
  {{- if .Values.ingress.ssl.redirect }}
  redirectToHttps:
    enabled: true
    responseCodeName: MOVED_PERMANENTLY_DEFAULT
  {{- end }}
  {{- if .Values.ingress.ssl.policy }}
  sslPolicy: {{ .Values.ingress.ssl.policy }}
  {{- end }}
{{- end }}
