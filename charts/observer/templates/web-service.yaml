{{- if and (eq .Values.mode "distributed") .Values.distributed.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "observer.fullname" . }}-web
  labels:
    {{- include "observer.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  type: {{ .Values.distributed.web.service.type }}
  ports:
  - port: {{ .Values.distributed.web.service.port }}
    targetPort: http
    protocol: TCP
    name: http
  selector:
    {{- include "observer.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: web
{{- end }}
