{{- if and (eq .Values.mode "distributed") .Values.distributed.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "observer.fullname" . }}-api
  labels:
    {{- include "observer.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.distributed.api.service.type }}
  ports:
  - port: {{ .Values.distributed.api.service.port }}
    targetPort: http
    protocol: TCP
    name: http
  {{- if .Values.metrics.enabled }}
  - port: {{ .Values.metrics.port }}
    targetPort: metrics
    protocol: TCP
    name: metrics
  {{- end }}
  selector:
    {{- include "observer.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
{{- end }}
