# Default values for observer
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Deployment mode: "aio" or "distributed"
mode: aio

# Global image configuration
image:
  registry: ghcr.io
  repository: stanterprise/observer
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: latest

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# AIO (All-in-One) mode configuration
aio:
  enabled: true
  replicaCount: 1

  resources:
    limits:
      cpu: 2000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 512Mi

  service:
    type: ClusterIP
    # Web UI port
    webPort: 80
    # gRPC ingestion port
    grpcPort: 50051
    # API port (internal)
    apiPort: 8080
    # NATS client port
    natsPort: 4222
    # NATS monitoring port
    natsMonitoringPort: 8222

  persistence:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 10Gi
    # existingClaim: ""

  env:
    MONGODB_URI: mongodb://root:password@localhost:27017/observer?authSource=admin
    STORAGE_DRIVER: local
    ARTIFACTS_DIR: /data/artifacts
    NATS_URL: nats://localhost:4222
    NATS_STREAM: tests_events
    NATS_WS_CONSUMER: websocket

  # gRPC LoadBalancer for direct external access (alternative to Ingress)
  grpcLoadBalancer:
    enabled: false
    port: 50051
    annotations: {}
    # loadBalancerIP: ""  # Specify a static IP if needed
    # loadBalancerSourceRanges: []  # Restrict source IPs if needed

# Distributed mode configuration
distributed:
  enabled: false

  # Ingestion service configuration
  ingestion:
    replicaCount: 1

    resources:
      limits:
        cpu: 1000m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi

    service:
      type: ClusterIP
      port: 50051
      # For external access (e.g., LoadBalancer or NodePort)
      # type: LoadBalancer

    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 2
      targetCPUUtilizationPercentage: 80
      targetMemoryUtilizationPercentage: 80

    env:
      PORT: "50051"
      NATS_STREAM: tests_events
      NATS_SUBJECT_PREFIX: tests.events.v1

  # Processor service configuration
  processor:
    replicaCount: 1

    resources:
      limits:
        cpu: 1000m
        memory: 1Gi
      requests:
        cpu: 200m
        memory: 256Mi

    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 80
      targetMemoryUtilizationPercentage: 80

    env:
      NATS_STREAM: tests_events
      NATS_CONSUMER: processor

  # API service configuration
  api:
    replicaCount: 1

    resources:
      limits:
        cpu: 1000m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi

    service:
      type: ClusterIP
      port: 8080

    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 80
      targetMemoryUtilizationPercentage: 80

    env:
      PORT: "8080"
      NATS_STREAM: tests_events
      NATS_WS_CONSUMER: websocket
      CORS_ALLOWED_ORIGINS: "*"

  # Web UI configuration
  web:
    replicaCount: 1

    resources:
      limits:
        cpu: 500m
        memory: 256Mi
      requests:
        cpu: 50m
        memory: 64Mi

    service:
      type: ClusterIP
      port: 80

    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 2
      targetCPUUtilizationPercentage: 80

    env:
      API_BACKEND_HOST: observer-api
      API_BACKEND_PORT: "8080"

# MongoDB configuration
mongodb:
  enabled: true
  # Use external MongoDB by setting enabled: false and configuring externalDatabase
  auth:
    enabled: true
    rootUser: root
    rootPassword: password
    usernames:
      - observer
    passwords:
      - password
    databases:
      - observer
  persistence:
    enabled: true
    size: 10Gi
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 256Mi

# External database configuration (when mongodb.enabled=false)
externalDatabase:
  host: ""
  port: 27017
  username: observer
  password: ""
  database: observer
  authSource: admin
  # Use existing secret for password
  existingSecret: ""
  existingSecretPasswordKey: password

# NATS configuration
nats:
  enabled: true
  # Use external NATS by setting enabled: false and configuring externalNats
  config:
    jetstream:
      enabled: true
      fileStore:
        pvc:
          size: 10Gi
  natsBox:
    enabled: false

  resources:
    limits:
      cpu: 1000m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

# External NATS configuration (when nats.enabled=false)
externalNats:
  url: ""
  # Use existing secret for credentials
  existingSecret: ""

# Gateway API configuration (alternative to Ingress)
# GKE Gateway API for advanced L7 load balancing
gateway:
  enabled: false
  className: gke-l7-global-external-managed
  annotations: {}
  # TLS configuration for Gateway
  tls:
    enabled: false
    # Certificate reference - should match ManagedCertificate name
    certificateRefs: []
    # - name: observer-gateway-cert

# Ingress configuration
# Each ingress can be independently enabled and configured
ingress:
  # Google-managed SSL certificate (GCP/GKE only)
  # Automatically provisions and renews certificates for your domains
  managedCertificate:
    enabled: false
    # When enabled, creates a ManagedCertificate resource for all ingress hosts
    # Certificate provisioning takes 15-60 minutes on first deployment
    # Requires valid DNS records pointing to the load balancer IPs

  # SSL/HTTPS configuration
  ssl:
    # Redirect HTTP to HTTPS (only enable after certificates are provisioned)
    redirect: false
    # TLS policy (GCP only) - MODERN, COMPATIBLE, or RESTRICTED
    # MODERN: TLS 1.2+, strong ciphers
    # COMPATIBLE: TLS 1.0+, wider compatibility
    # RESTRICTED: TLS 1.2+, most restrictive
    policy: "MODERN"

  # Web UI ingress - serves the React frontend
  web:
    enabled: false
    className: "nginx"
    annotations:
      {}
      # cert-manager.io/cluster-issuer: "letsencrypt-prod"
      # nginx.ingress.kubernetes.io/ssl-redirect: "true"
    hosts:
      - host: observer.example.com
        paths:
          - path: /
            pathType: Prefix
    tls:
      []
      # - secretName: observer-web-tls
      #   hosts:
      #     - observer.example.com

  # API ingress - serves the REST/GraphQL API and WebSocket
  api:
    enabled: false
    className: "nginx"
    annotations:
      {}
      # cert-manager.io/cluster-issuer: "letsencrypt-prod"
      # nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
      # nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
      # nginx.ingress.kubernetes.io/websocket-services: "observer-api"
    hosts:
      - host: api.observer.example.com
        paths:
          - path: /
            pathType: Prefix
    tls:
      []
      # - secretName: observer-api-tls
      #   hosts:
      #     - api.observer.example.com

  # gRPC ingress - serves the gRPC ingestion endpoint
  grpc:
    enabled: false
    className: "nginx"
    annotations:
      nginx.ingress.kubernetes.io/backend-protocol: "GRPC"
      # nginx.ingress.kubernetes.io/ssl-redirect: "true"
    hosts:
      - host: grpc.observer.example.com
        paths:
          - path: /
            pathType: Prefix
    tls:
      []
      # - secretName: observer-grpc-tls
      #   hosts:
      #     - grpc.observer.example.com
    # GCP BackendConfig for gRPC (only used with GCE ingress class)
    # Set enabled: true when using className: "gce" for proper HTTP/2 support
    backendConfig:
      enabled: false
      healthCheck:
        checkIntervalSec: 10
        timeoutSec: 5
        type: HTTP2
        requestPath: /grpc.health.v1.HealthService/Check
      timeoutSec: 30
      connectionDraining:
        drainingTimeoutSec: 60

# Service Account
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Pod Security Context
podSecurityContext:
  fsGroup: 2000

# Security Context (for distributed mode services)
securityContext:
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1000

# AIO Security Context (s6-overlay requires root for initialization)
aioSecurityContext:
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: false
  runAsUser: 0

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}
