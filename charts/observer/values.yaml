# Default values for observer
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Deployment mode: "aio" or "distributed"
mode: distributed

# Global image configuration
image:
  registry: ghcr.io
  repository: stanterprise/observer
  # pullPolicy: IfNotPresent  # Omit to auto-detect: Always for mutable tags (latest/main/develop), IfNotPresent otherwise.
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
podAnnotations: {}
nameOverride: ""
fullnameOverride: ""

# AIO (All-in-One) mode configuration
aio:
  enabled: false
  replicaCount: 1

  resources:
    limits:
      cpu: 2000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 512Mi

  service:
    type: ClusterIP
    # Web UI port
    webPort: 80
    # gRPC ingestion port
    grpcPort: 50051
    # API port (internal)
    apiPort: 8080
    # NATS client port
    natsPort: 4222
    # NATS monitoring port
    natsMonitoringPort: 8222

  persistence:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 10Gi
    # existingClaim: ""

  env:
    MONGODB_URI: mongodb://root:password@localhost:27017/observer?authSource=admin
    STORAGE_DRIVER: local
    ARTIFACTS_DIR: /data/artifacts
    NATS_URL: nats://localhost:4222
    NATS_STREAM: tests_events
    NATS_WS_CONSUMER: websocket

  # gRPC LoadBalancer for direct external access (alternative to Ingress)
  grpcLoadBalancer:
    enabled: false
    port: 50051
    annotations: {}
    # loadBalancerIP: ""  # Specify a static IP if needed
    # loadBalancerSourceRanges: []  # Restrict source IPs if needed

# Distributed mode configuration
distributed:
  enabled: true

  # Ingestion service configuration
  ingestion:
    replicaCount: 1

    resources:
      limits:
        cpu: 1000m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi

    service:
      type: ClusterIP
      port: 50051
      # For external access (e.g., LoadBalancer or NodePort)
      # type: LoadBalancer

    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 2
      targetCPUUtilizationPercentage: 80
      targetMemoryUtilizationPercentage: 80

    env:
      PORT: "50051"
      NATS_STREAM: tests_events
      NATS_SUBJECT_PREFIX: tests.events.v1

  # Processor service configuration
  processor:
    replicaCount: 1

    resources:
      limits:
        cpu: 1000m
        memory: 1Gi
      requests:
        cpu: 200m
        memory: 256Mi

    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 80
      targetMemoryUtilizationPercentage: 80

    env:
      NATS_STREAM: tests_events
      NATS_CONSUMER: processor

  # API service configuration
  api:
    replicaCount: 1

    resources:
      limits:
        cpu: 1000m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi

    service:
      type: ClusterIP
      port: 8080

    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 80
      targetMemoryUtilizationPercentage: 80

    env:
      PORT: "8080"
      NATS_STREAM: tests_events
      NATS_WS_CONSUMER: websocket
      CORS_ALLOWED_ORIGINS: "*"

  # Web UI configuration
  web:
    replicaCount: 1

    resources:
      limits:
        cpu: 500m
        memory: 256Mi
      requests:
        cpu: 50m
        memory: 64Mi

    service:
      type: ClusterIP
      port: 80

    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 2
      targetCPUUtilizationPercentage: 80

    securityContext:
      readOnlyRootFilesystem: false
      runAsNonRoot: false
      runAsUser: 0

    env:
      API_BACKEND_HOST: observer-api
      API_BACKEND_PORT: "8080"

postgres:
  # Used when postgresql.enabled=false (external PostgreSQL)
  host: ""
  port: 5432
  username: observer
  password: password
  database: observer
  sslmode: disable
  migration:
    enabled: true
    backoffLimit: 3

# Embedded PostgreSQL dependency (default)
postgresql:
  enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql
  auth:
    username: observer
    password: password
    database: observer
    postgresPassword: password
  architecture: standalone
  primary:
    persistence:
      enabled: true
      size: 10Gi
    resources:
      limits:
        cpu: 1000m
        memory: 1Gi
      requests:
        cpu: 250m
        memory: 256Mi

# MongoDB configuration
mongodb:
  enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/mongodb
  # Use external MongoDB by setting enabled: false and configuring externalDatabase
  auth:
    enabled: true
    rootUser: root
    rootPassword: password
    usernames:
      - observer
    passwords:
      - password
    databases:
      - observer
  persistence:
    enabled: true
    size: 10Gi
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 256Mi

# External database configuration (when mongodb.enabled=false)
externalDatabase:
  host: ""
  port: 27017
  username: observer
  password: ""
  database: observer
  authSource: admin

# NATS configuration
nats:
  enabled: true
  # Use external NATS by setting enabled: false and configuring externalNats
  config:
    jetstream:
      enabled: true
      fileStore:
        pvc:
          size: 10Gi
  natsBox:
    enabled: false

  resources:
    limits:
      cpu: 1000m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

# External NATS configuration (when nats.enabled=false)
externalNats:
  url: ""

# Distributed runtime connection secret
runtime:
  # Reuse an existing Secret containing NATS_URL, POSTGRES_DSN, and MONGODB_URI.
  # When empty, the chart renders a generated Secret for distributed workloads.
  # Legacy distributed.*.env connection overrides are folded into that generated
  # Secret for upgrade compatibility instead of being rendered directly on pods.
  existingSecret: ""

# Service Account
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Pod Security Context
podSecurityContext:
  fsGroup: 2000

# Security Context (for distributed mode services)
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1000

# AIO Security Context (s6-overlay requires root for init; allowPrivilegeEscalation
# must remain true so s6-overlay can setuid/setgid during service supervision).
aioSecurityContext:
  allowPrivilegeEscalation: true
  capabilities:
    drop:
      - ALL
    add:
      - SETUID
      - SETGID
      - CHOWN
      - DAC_OVERRIDE
  readOnlyRootFilesystem: false
  runAsNonRoot: false
  runAsUser: 0

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}
