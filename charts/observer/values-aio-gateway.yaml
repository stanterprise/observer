# Values for AIO deployment with Gateway API
# This configuration uses GKE Gateway API instead of Ingress for better gRPC support
# Requires: GKE cluster with Gateway API enabled

mode: aio

aio:
  enabled: true
  replicaCount: 1
  resources:
    limits:
      cpu: 2000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 512Mi
  persistence:
    enabled: true
    size: 10Gi

distributed:
  enabled: false

postgresql:
  enabled: false

# Disable external dependencies in AIO mode
mongodb:
  enabled: false

nats:
  enabled: false

# Exposing services externally is the operator's responsibility.
# Configure a LoadBalancer, NodePort, or an external ingress controller
# appropriate for your cluster environment.
# This chart does not render Ingress or Gateway manifests.
