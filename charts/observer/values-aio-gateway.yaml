# Values for AIO deployment with Gateway API
# This configuration uses GKE Gateway API instead of Ingress for better gRPC support
# Requires: GKE cluster with Gateway API enabled

mode: aio

aio:
  enabled: true
  replicaCount: 1
  resources:
    limits:
      cpu: 2000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 512Mi
  persistence:
    enabled: true
    size: 10Gi

distributed:
  enabled: false

# Disable external dependencies in AIO mode
mongodb:
  enabled: false

nats:
  enabled: false

# Disable traditional Ingress (using Gateway API instead)
ingress:
  web:
    enabled: false
  api:
    enabled: false
  grpc:
    enabled: false
  managedCertificate:
    enabled: true
  ssl:
    redirect: false
    policy: "MODERN"

# Gateway API configuration
gateway:
  enabled: true
  gatewayClassName: gke-l7-global-external-managed

  # Annotations for Google Cloud integration
  annotations:
    networking.gke.io/certmap: observer-cert-map

  # Static IP addresses (optional, will be allocated if not specified)
  addresses: []

  # TLS configuration using Google-managed certificates
  tls:
    enabled: false # Start without TLS, add later
    certificateName: observer-cert
    gcpCertificateName: "" # GCP Certificate Manager certificate name

  # Web UI route
  web:
    enabled: true
    hostname: observer.stanterprise.dev

  # API route
  api:
    enabled: true
    hostname: api.observer.stanterprise.dev

  # gRPC route with native GRPCRoute support
  grpc:
    enabled: true
    hostname: grpc.observer.stanterprise.dev
