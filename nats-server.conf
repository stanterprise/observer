# NATS JetStream Configuration
# Observer Service - Test Event Broker

# Enable JetStream
jetstream {
  store_dir: "/data"
  max_file_store: 10GB
}

# Set max payload to 8MB (8388608 bytes)
max_payload: 8388608

# Monitoring port
http_port: 8222

# Cluster settings (optional for single-node setup)
# cluster {
#   port: 6222
# }
