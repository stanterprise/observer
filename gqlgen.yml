# GraphQL schema files to read
schema:
  - pkg/api/graph/schema.graphqls

# Where to write the generated code
exec:
  filename: pkg/api/graph/generated.go
  package: graph

# Where to write the resolver implementation stubs
model:
  filename: pkg/api/graph/model/models_gen.go
  package: model

# Resolver generation
resolver:
  layout: follow-schema
  dir: pkg/api/graph
  package: graph
  filename_template: "{name}.resolvers.go"

# Model mappings - use existing database models
models:
  ID:
    model:
      - github.com/99designs/gqlgen/graphql.ID
  Time:
    model:
      - github.com/99designs/gqlgen/graphql.Time
  TestCaseRun:
    model:
      - github.com/stanterprise/observer/internal/models.TestCaseRun
    fields:
      steps:
        resolver: true
  StepRun:
    model:
      - github.com/stanterprise/observer/internal/models.StepRun
    fields:
      testCase:
        resolver: true

# Skip runtime package generation
skip_mod_tidy: false
