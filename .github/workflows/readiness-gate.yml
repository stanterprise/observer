name: Release Readiness Gate

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "specs/001-release-cleanup/**"
      - "docs/**"
      - ".gitleaks.toml"
      - ".github/workflows/readiness-gate.yml"

jobs:
  readiness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          config-path: .gitleaks.toml

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Validate readiness artifacts
        run: |
          python -m pip install --upgrade pip jsonschema
          python - <<'PY'
          import json
          from jsonschema import Draft202012Validator

          pairs = [
              ("specs/001-release-cleanup/contracts/readiness-checklist.schema.json",
               "specs/001-release-cleanup/artifacts/readiness-checklist.json"),
              ("specs/001-release-cleanup/contracts/cleanup-task.schema.json",
               "specs/001-release-cleanup/artifacts/cleanup-tasks.json"),
              ("specs/001-release-cleanup/contracts/risk-register.schema.json",
               "specs/001-release-cleanup/artifacts/risk-register.json"),
          ]

          failed = False
          for schema_path, data_path in pairs:
              with open(schema_path) as sf:
                  schema = json.load(sf)
              with open(data_path) as df:
                  data = json.load(df)
              v = Draft202012Validator(schema)
              errors = sorted(v.iter_errors(data), key=lambda e: e.path)
              if errors:
                  failed = True
                  print(f"FAIL {data_path}")
                  for e in errors:
                      print(" -", e.message)
              else:
                  print(f"PASS {data_path}")

          if failed:
              raise SystemExit(1)
          PY

      - name: Generate Go license report
        run: |
          go install github.com/google/go-licenses@latest
          go-licenses report ./... > specs/001-release-cleanup/artifacts/go-licenses.txt
          test -s specs/001-release-cleanup/artifacts/go-licenses.txt
