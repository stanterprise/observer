name: Helm Chart Publishing

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
    paths:
      - 'charts/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  CHART_NAME: observer

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0
      
      - name: Add Helm repositories
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo add nats https://nats-io.github.io/k8s/helm/charts/
          helm repo update
      
      - name: Helm dependency update
        run: |
          cd charts/observer
          helm dependency update
      
      - name: Lint Helm chart
        run: |
          helm lint charts/observer
          helm lint charts/observer -f charts/observer/values-aio.yaml
          helm lint charts/observer -f charts/observer/values-production.yaml
      
      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2
      
      - name: Run chart-testing (lint)
        run: ct lint --config .github/ct.yaml --charts charts/observer || true
      
      - name: Template rendering test
        run: |
          echo "Testing distributed mode template rendering..."
          helm template observer charts/observer > /dev/null
          
          echo "Testing AIO mode template rendering..."
          helm template observer charts/observer -f charts/observer/values-aio.yaml > /dev/null
          
          echo "Testing production mode template rendering..."
          helm template observer charts/observer -f charts/observer/values-production.yaml > /dev/null
          
          echo "All template rendering tests passed!"

  package-push:
    runs-on: ubuntu-latest
    needs: lint-test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0
      
      - name: Add Helm repositories
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo add nats https://nats-io.github.io/k8s/helm/charts/
          helm repo update
      
      - name: Helm dependency update
        run: |
          cd charts/observer
          helm dependency update
      
      - name: Log in to Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} --username ${{ github.actor }} --password-stdin
      
      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="0.1.0-${GITHUB_SHA::7}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Chart version: $VERSION"
      
      - name: Update chart version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.version }}/" charts/observer/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.version.outputs.version }}\"/" charts/observer/Chart.yaml
      
      - name: Package Helm chart
        run: |
          helm package charts/observer --version ${{ steps.version.outputs.version }}
      
      - name: Push Helm chart to OCI registry
        run: |
          helm push ${{ env.CHART_NAME }}-${{ steps.version.outputs.version }}.tgz oci://${{ env.REGISTRY }}/${{ github.repository }}/charts
      
      - name: Upload chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: ${{ env.CHART_NAME }}-${{ steps.version.outputs.version }}.tgz
          retention-days: 30

  publish-github-pages:
    runs-on: ubuntu-latest
    needs: package-push
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Checkout gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Create or checkout gh-pages branch
          git checkout gh-pages || git checkout --orphan gh-pages
          
          # Keep only index.yaml if it exists
          if [ -f index.yaml ]; then
            cp index.yaml /tmp/index.yaml.backup
          fi
          
          # Clean the branch
          git rm -rf . || true
          
          # Restore index.yaml if it existed
          if [ -f /tmp/index.yaml.backup ]; then
            cp /tmp/index.yaml.backup index.yaml
          fi
      
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0
      
      - name: Add Helm repositories
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo add nats https://nats-io.github.io/k8s/helm/charts/
          helm repo update
      
      - name: Download chart artifact
        uses: actions/download-artifact@v4
        with:
          name: helm-chart
      
      - name: Update Helm repository index
        run: |
          helm repo index . --url https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
      
      - name: Commit and push to gh-pages
        run: |
          git add .
          git commit -m "Publish Helm chart from ${{ github.sha }}" || echo "No changes to commit"
          git push origin gh-pages
