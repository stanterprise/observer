name: Helm Chart Publishing

on:
  pull_request:
    paths:
      - "charts/**"
      - ".github/workflows/helm-publish.yml"
      - ".github/ct.yaml"
  push:
    branches:
      - master
    tags:
      - "v*.*.*"
    paths:
      - "charts/**"
      - ".github/workflows/helm-publish.yml"
      - ".github/ct.yaml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  CHART_NAME: observer

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Add Helm repositories
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo add nats https://nats-io.github.io/k8s/helm/charts/
          helm repo update

      - name: Helm dependency update
        run: |
          cd charts/observer
          helm dependency update

      - name: Lint Helm chart
        run: |
          helm lint charts/observer
          helm lint charts/observer -f charts/observer/values-aio.yaml
          helm lint charts/observer -f charts/observer/values-production.yaml
          helm lint charts/observer -f charts/observer/values-aio-gateway.yaml

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2

      - name: Run chart-testing (lint)
        run: ct lint --config .github/ct.yaml --charts charts/observer

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz -o /tmp/kubeconform.tar.gz
          tar -xzf /tmp/kubeconform.tar.gz -C /tmp kubeconform
          sudo mv /tmp/kubeconform /usr/local/bin/kubeconform
          kubeconform -v

      - name: Template rendering and manifest validation
        run: |
          set -euo pipefail

          mkdir -p /tmp/observer-renders

          render_and_validate() {
            local name="$1"
            shift

            echo "Rendering ${name}..."
            helm template observer charts/observer "$@" > "/tmp/observer-renders/${name}.yaml"

            echo "Validating ${name} manifests with kubeconform..."
            kubeconform -summary -ignore-missing-schemas "/tmp/observer-renders/${name}.yaml"
          }

          render_and_validate default
          render_and_validate aio -f charts/observer/values-aio.yaml
          render_and_validate production -f charts/observer/values-production.yaml
          render_and_validate aio-gateway -f charts/observer/values-aio-gateway.yaml
          render_and_validate external-nats \
            --set nats.enabled=false \
            --set externalNats.url=nats://nats.example.com:4222
          render_and_validate external-postgres \
            --set postgresql.enabled=false \
            --set postgres.host=postgres.example.com
          render_and_validate external-mongodb \
            --set mongodb.enabled=false \
            --set externalDatabase.host=mongo.example.com
          render_and_validate all-external \
            --set postgresql.enabled=false \
            --set postgres.host=postgres.example.com \
            --set mongodb.enabled=false \
            --set externalDatabase.host=mongo.example.com \
            --set nats.enabled=false \
            --set externalNats.url=nats://nats.example.com:4222

  upgrade-smoke-test:
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Create kind cluster
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: observer-smoke
          wait: 120s

      - name: Add Helm repositories
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo add nats https://nats-io.github.io/k8s/helm/charts/
          helm repo update

      - name: Select upgrade baseline
        id: baseline
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_REF="origin/${{ github.base_ref }}"
          elif git rev-parse HEAD^ >/dev/null 2>&1; then
            BASE_REF="$(git rev-parse HEAD^)"
          else
            BASE_REF="origin/master"
          fi

          echo "ref=${BASE_REF}" >> "$GITHUB_OUTPUT"
          echo "Using baseline ref: ${BASE_REF}"

      - name: Prepare baseline and current charts
        run: |
          set -euo pipefail

          rm -rf /tmp/base-chart
          mkdir -p /tmp/base-chart
          git archive "${{ steps.baseline.outputs.ref }}" charts/observer | tar -x -C /tmp/base-chart

          helm dependency update /tmp/base-chart/charts/observer
          helm dependency update charts/observer

      - name: Write smoke values
        run: |
          cat > /tmp/observer-upgrade-values.yaml <<'EOF'
          mode: distributed
          aio:
            enabled: false
          distributed:
            enabled: true
          image:
            tag: v0.7.0
          postgresql:
            enabled: false
          postgres:
            host: smoke-postgresql
            port: 5432
            username: observer
            password: smoke-password
            database: observer
            sslmode: disable
          mongodb:
            image:
              repository: bitnamilegacy/mongodb
              tag: 8.0.4-debian-12-r0
          EOF

      - name: Install external PostgreSQL for smoke test
        run: |
          helm upgrade --install smoke-postgresql bitnami/postgresql \
            --namespace observer-smoke \
            --create-namespace \
            --set auth.username=observer \
            --set auth.password=smoke-password \
            --set auth.database=observer \
            --set auth.postgresPassword=smoke-postgres-password \
            --wait \
            --timeout 10m

      - name: Install baseline chart
        run: |
          helm upgrade --install smoke-observer /tmp/base-chart/charts/observer \
            --namespace observer-smoke \
            -f /tmp/observer-upgrade-values.yaml \
            --wait \
            --wait-for-jobs \
            --timeout 15m

      - name: Upgrade to current chart
        run: |
          helm upgrade smoke-observer charts/observer \
            --namespace observer-smoke \
            -f /tmp/observer-upgrade-values.yaml \
            --wait \
            --wait-for-jobs \
            --timeout 15m

      - name: Verify upgraded release
        run: |
          set -euo pipefail

          kubectl -n observer-smoke rollout status deployment/smoke-observer-api --timeout=5m
          kubectl -n observer-smoke rollout status deployment/smoke-observer-ingestion --timeout=5m
          kubectl -n observer-smoke rollout status deployment/smoke-observer-processor --timeout=5m
          kubectl -n observer-smoke rollout status deployment/smoke-observer-web --timeout=5m
          kubectl -n observer-smoke get secret smoke-observer-runtime-env >/dev/null
          kubectl -n observer-smoke get pods

      - name: Dump smoke cluster state on failure
        if: failure()
        run: |
          kubectl -n observer-smoke get all || true
          kubectl -n observer-smoke get secrets || true
          kubectl -n observer-smoke logs deploy/smoke-observer-api --tail=200 || true
          kubectl -n observer-smoke logs deploy/smoke-observer-processor --tail=200 || true
          kubectl -n observer-smoke logs job/smoke-observer-migrate --tail=200 || true

  package-push:
    runs-on: ubuntu-latest
    needs:
      - lint-test
      - upgrade-smoke-test
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Add Helm repositories
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo add nats https://nats-io.github.io/k8s/helm/charts/
          helm repo update

      - name: Helm dependency update
        run: |
          cd charts/observer
          helm dependency update

      - name: Log in to Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} --username ${{ github.actor }} --password-stdin

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            # For branch pushes and workflow_dispatch: use chart version + short SHA
            CHART_VERSION=$(grep '^version:' charts/observer/Chart.yaml | awk '{print $2}')
            VERSION="${CHART_VERSION}-${GITHUB_SHA::7}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Chart version: $VERSION"

      - name: Update chart version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.version }}/" charts/observer/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.version.outputs.version }}\"/" charts/observer/Chart.yaml

      - name: Package Helm chart
        run: |
          helm package charts/observer --version ${{ steps.version.outputs.version }}

      - name: Push Helm chart to OCI registry
        run: |
          helm push ${{ env.CHART_NAME }}-${{ steps.version.outputs.version }}.tgz oci://${{ env.REGISTRY }}/${{ github.repository }}/charts

      - name: Upload chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: ${{ env.CHART_NAME }}-${{ steps.version.outputs.version }}.tgz
          retention-days: 30

  publish-github-pages:
    runs-on: ubuntu-latest
    needs: package-push
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create or checkout gh-pages branch
          git checkout gh-pages || git checkout --orphan gh-pages

          # Keep only index.yaml if it exists
          if [ -f index.yaml ]; then
            cp index.yaml /tmp/index.yaml.backup
          fi

          # Clean the branch
          git rm -rf . || true

          # Restore index.yaml if it existed
          if [ -f /tmp/index.yaml.backup ]; then
            cp /tmp/index.yaml.backup index.yaml
          fi

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Add Helm repositories
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo add nats https://nats-io.github.io/k8s/helm/charts/
          helm repo update

      - name: Download chart artifact
        uses: actions/download-artifact@v4
        with:
          name: helm-chart

      - name: Update Helm repository index
        run: |
          helm repo index . --url https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/

      - name: Commit and push to gh-pages
        run: |
          git add .
          git commit -m "Publish Helm chart from ${{ github.sha }}" || echo "No changes to commit"
          git push origin gh-pages
