name: Docker Image Publishing

# Optimized multi-platform builds with BuildKit cache mounts
# - Uses registry cache for cross-runner cache sharing
# - Multi-platform (AMD64 + ARM64) for all non-PR builds
# - Expected build times: 8-12 min (first), 2-4 min (cached)
# See: docs/BUILD_OPTIMIZATION.md

on:
  push:
    branches:
      - master
      - develop
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - master
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - image: aio
            dockerfile: Dockerfile.aio
            context: .
          - image: ingestion
            dockerfile: Dockerfile.ingestion
            context: .
          - image: processor
            dockerfile: Dockerfile.processor
            context: .
          - image: api
            dockerfile: Dockerfile.api
            context: .
          - image: web
            dockerfile: Dockerfile.web
            context: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          # Multi-platform for releases and main branch, single platform for PRs (faster)
          platforms: ${{ (github.event_name != 'pull_request') && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Use multi-layer cache strategy for optimal performance
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.image }}:buildcache
            type=gha
          cache-to: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.image }}:buildcache,mode=max
            type=gha,mode=max

      - name: Report build performance
        if: always()
        run: |
          echo "### 📊 Build Performance for ${{ matrix.image }}" >> $GITHUB_STEP_SUMMARY
          echo "**Platform(s):** ${{ (github.event_name != 'pull_request') && 'linux/amd64,linux/arm64' || 'linux/amd64' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Cache Strategy:** Registry + GitHub Actions cache" >> $GITHUB_STEP_SUMMARY
          echo "**Build Status:** ${{ steps.build.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "ℹ️ For optimization details, see [BUILD_OPTIMIZATION.md](https://github.com/${{ github.repository }}/blob/main/docs/BUILD_OPTIMIZATION.md)" >> $GITHUB_STEP_SUMMARY
