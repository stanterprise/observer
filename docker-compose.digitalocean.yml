version: "3.9"

# ============================================================================
# Observer Deployment for DigitalOcean Droplet
# ============================================================================
# This docker-compose configuration is optimized for production deployment
# on a DigitalOcean droplet (2GB+ RAM recommended).
#
# REQUIRED SETUP:
#   1. Copy .env.digitalocean to .env: cp .env.digitalocean .env
#   2. Edit .env with your domain and secrets
#   3. Run: docker compose -f docker-compose.digitalocean.yml up -d
#   4. Check health: curl http://localhost/health
#
# DEPLOYMENT MODES:
#   - Single droplet (all-in-one): Recommended for small deployments
#   - Multi-droplet (distributed): For high availability
#
# ============================================================================

services:
  # ============================================================================
  # All-in-One Deployment (Single Container)
  # Best for small/medium deployments on a single droplet
  # ============================================================================
  observer:
    # Pin to a specific version for reproducible deployments.
    # To upgrade, set OBSERVER_VERSION to the desired released tag (e.g. v0.3.0).
    image: ghcr.io/stanterprise/observer/aio:${OBSERVER_VERSION:-latest}
    container_name: observer
    restart: always

    # Resource constraints (adjust based on droplet size).
    # These use compose-native keys supported by `docker compose` (non-Swarm).
    # 2GB droplet: 1 CPU, 1GB RAM  →  CPU_LIMIT=1.0  MEMORY_LIMIT=1g
    # 4GB droplet: 2 CPU, 2GB RAM  →  CPU_LIMIT=2.0  MEMORY_LIMIT=2g
    # 8GB droplet: 4 CPU, 4GB RAM  →  CPU_LIMIT=4.0  MEMORY_LIMIT=4g
    mem_limit: ${MEMORY_LIMIT:-2g}
    mem_reservation: ${MEMORY_RESERVATION:-1g}
    cpus: "${CPU_LIMIT:-2.0}"

    environment:
      # MongoDB configuration
      MONGODB_URI: mongodb://localhost:27017/observer

      # Storage configuration for artifacts
      STORAGE_DRIVER: local
      STORAGE_LOCAL_BASE_PATH: /data/artifacts
      # Set STORAGE_LOCAL_BASE_URL in .env (deploy script sets it based on SSL mode).
      # Use http:// for --ssl none and https:// for letsencrypt or self-signed.
      STORAGE_LOCAL_BASE_URL: ${STORAGE_LOCAL_BASE_URL:-http://${DOMAIN_NAME:-localhost}/api/attachments}

      # Logging
      LOG_LEVEL: info

      # Security: JWT token for API (generate with: openssl rand -base64 32)
      JWT_SECRET: ${JWT_SECRET}

    ports:
      # Web UI (accessed via nginx reverse proxy on port 80/443)
      - "127.0.0.1:${WEB_PORT:-3000}:80"

      # gRPC ingestion endpoint (exposed for test reporters)
      - "0.0.0.0:${GRPC_PORT:-50051}:50051"

      # API service (for internal communication with nginx)
      - "127.0.0.1:${API_PORT:-8080}:8080"

      # NATS monitoring dashboard (optional, restrict access)
      - "127.0.0.1:${NATS_HTTP_PORT:-8222}:8222"

    volumes:
      # Persistent data volume
      - observer-data:/data

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    networks:
      - observer-network

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=observer"

  # ============================================================================
  # Nginx Reverse Proxy (SSL/TLS Termination)
  # ============================================================================
  nginx:
    image: docker.io/library/nginx:1.27
    container_name: observer-nginx
    restart: always
    command: >
      /bin/sh -c "
      if [ \"$$SSL_ENABLED\" = 'false' ]; then
        TMPL=/etc/nginx/templates/http.conf.template;
      else
        TMPL=/etc/nginx/templates/ssl.conf.template;
      fi;
      envsubst '$$DOMAIN_NAME $$TLS_SERVER_NAMES $$TLS_CERT_FILE $$TLS_CERT_KEY_FILE'
        < $$TMPL > /etc/nginx/conf.d/default.conf
      && exec nginx -g 'daemon off;'
      "

    mem_limit: 512m
    mem_reservation: 256m
    cpus: "1.0"

    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"

    volumes:
      # Nginx reverse-proxy configuration templates for droplet deployment
      - ./docker/nginx/nginx.digitalocean.conf:/etc/nginx/templates/ssl.conf.template:ro
      - ./docker/nginx/nginx.digitalocean.http.conf:/etc/nginx/templates/http.conf.template:ro

      # SSL certificates (Let's Encrypt or self-signed) - mount full tree (live/* uses symlinks).
      - ${SSL_CERT_PATH:-/etc/letsencrypt}:/etc/letsencrypt:ro

      # Let's Encrypt challenge directory
      - /var/www/certbot:/var/www/certbot:ro

    environment:
      DOMAIN_NAME: ${DOMAIN_NAME:-observer.rocks}
      TLS_SERVER_NAMES: ${TLS_SERVER_NAMES:-observer.rocks}
      SSL_ENABLED: ${SSL_ENABLED:-true}
      TLS_CERT_FILE: ${TLS_CERT_FILE:-/etc/letsencrypt/live/observer.rocks/fullchain.pem}
      TLS_CERT_KEY_FILE: ${TLS_CERT_KEY_FILE:-/etc/letsencrypt/live/observer.rocks/privkey.pem}

    depends_on:
      - observer

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

    networks:
      - observer-network

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=nginx"

  # ============================================================================
  # Certbot (Let's Encrypt SSL Certificate Management)
  # Only run if using Let's Encrypt (not needed for self-signed certs)
  # ============================================================================
  certbot:
    image: docker.io/certbot/certbot:v2.10.0
    container_name: observer-certbot
    restart: unless-stopped

    # Comment out volumes if not using certbot
    volumes:
      - ${SSL_CERT_PATH:-/etc/letsencrypt}:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot

    # Renew certificates every 12 hours
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done;'

    # Disable if not using certbot
    profiles: ["certbot"]

    networks:
      - observer-network

# ============================================================================
# Volumes
# ============================================================================
volumes:
  observer-data:
    driver: local

# ============================================================================
# Networks
# ============================================================================
networks:
  observer-network:
    driver: bridge
